<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Country Explorer</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="./css/style.css"/>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen font-sans">

<div id="main-header"></div>

<div
        class="relative bg-cover bg-center px-6 py-24 text-center"
        style="background-image: url('https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&w=1600&q=80');"
>
    <div class="absolute inset-0 bg-blue-900 opacity-60"></div>

    <div class="relative z-10">
        <h1 class="text-4xl font-bold text-white mb-2">Explore the World</h1>
        <p class="text-blue-100 text-sm mb-8">Search any country to discover its cities, currencies, languages and more.</p>

        <section id="search-section" class="max-w-xl mx-auto">
            <div class="relative">
                <div class="flex gap-2">
                    <input
                            id="search-input"
                            type="text"
                            placeholder="Search for a country..."
                            autocomplete="off"
                            class="flex-1 px-4 py-3 border border-gray-200 bg-white text-gray-800 rounded-lg text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                    />
                    <button
                            id="search-btn"
                            class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors"
                    >
                        Search
                    </button>
                </div>

                <ul
                        id="suggestions"
                        class="absolute z-10 w-full bg-white border border-gray-200 rounded-lg mt-1 shadow-md hidden text-left"
                ></ul>
            </div>
        </section>
    </div>
</div>

<main class="max-w-6xl mx-auto px-6 py-10">

    <section id="recent-section" class="mb-10 hidden">
        <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-3">Recent Searches</h2>
        <div id="recent-list" class="flex flex-wrap gap-2"></div>
    </section>

    <div id="countries-container"></div>
</main>

<script type="module" src="./js/home.js"></script>
</body>
</html>
