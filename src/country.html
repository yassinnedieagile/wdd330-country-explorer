<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Country Explorer</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="./css/style.css"/>
</head>
<body class="bg-bg-primary text-text-primary min-h-screen">

<div id="main-header"></div>

<main class="max-w-5xl mx-auto px-6 py-8">

    <a href="/" class="inline-flex items-center gap-2 mb-6 text-sm text-accent">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-left-icon lucide-arrow-left">
            <path d="m12 19-7-7 7-7"/>
            <path d="M19 12H5"/>
        </svg>
        Back to Search</a>

    <div id="app-state"></div>

    <section id="country-section" class="space-y-4 hidden">

        <div id="overview-container"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div id="currency-container"></div>
            <div id="languages-container"></div>
        </div>

        <div id="cities-container"></div>

    </section>

</main>

<script type="module" src="./js/country.js"></script>
</body>
</html>
